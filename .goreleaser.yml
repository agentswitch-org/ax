version: 2

project_name: ax

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/ax
    binary: ax
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/agentswitch-org/ax/internal/build.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    # Windows users expect a .zip, not a .tar.gz.
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CHANGELOG.md
      - config.example.toml
      - LICENSE
      - THIRD-PARTY-NOTICES

nfpms:
  - id: ax
    package_name: ax
    vendor: AgentSwitch
    homepage: https://github.com/agentswitch-org/ax
    maintainer: AgentSwitch <support@agentswitch.org>
    description: Session switcher for LLM CLI agents
    license: MIT
    section: utils
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/ax/README.md
      - src: LICENSE
        dst: /usr/share/doc/ax/LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: auto
  make_latest: "{{ if .Prerelease }}false{{ else }}true{{ end }}"
  header: |
    ## ax {{ .Tag }}

    ax manages command-line coding-agent sessions.

# Homebrew cask tap publishing.
# Prerequisites:
#   - a public GitHub repo: agentswitch-org/ax-homebrew
#   - a fine-grained PAT scoped to that repo stored as the TAP_GITHUB_TOKEN secret
# When TAP_GITHUB_TOKEN is empty, keep generating the cask in dist/ but skip
# pushing to the tap so the rest of the release can complete.
homebrew_casks:
  - name: "{{ if .Prerelease }}ax-rc{{ else }}ax{{ end }}"
    repository:
      owner: agentswitch-org
      name: ax-homebrew
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    skip_upload: "{{ if .Env.TAP_GITHUB_TOKEN }}false{{ else }}true{{ end }}"
    directory: Casks
    homepage: https://github.com/agentswitch-org/ax
    description: Session switcher for LLM CLI agents
    license: "MIT"
    binaries:
      - ax
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ax"]
          end
